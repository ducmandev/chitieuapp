name: chitieuapp
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^8.0.2
  intl: ^0.20.2
  path: ^1.9.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  local_auth: ^2.3.0
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  csv: ^7.2.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  fl_chart: ^0.66.0
  pdf: ^3.10.7
  printing: ^5.11.1
  uuid: ^4.3.3
  url_launcher: ^6.2.2
  crypto: ^3.0.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21 # android min sdk requirement
