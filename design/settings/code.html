<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFF500", // Warning Yellow from PRD
                        "secondary": "#FF00D6", // Electric Pink from PRD
                        "tertiary": "#00D1FF", // Cyan from PRD
                        "background-light": "#F2F0E9", // Bone from PRD
                        "background-dark": "#222210",
                        "ink": "#000000",
                        "error": "#FF3333",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["Space Grotesk", "monospace"], // Using Space Grotesk for mono feel as per instructions to stick to provided font, but styling it technically
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px #000000',
                        'hard-sm': '2px 2px 0px 0px #000000',
                    },
                    borderWidth: {
                        '3': '3px',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom Utilities for Neobrutalism */
        .neo-border {
            border: 3px solid #000000;
        }
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px #000000;
        }
        .neo-shadow-active:active {
            box-shadow: 0px 0px 0px 0px #000000;
            transform: translate(4px, 4px);
        }
        /* Toggle Switch Styling */
        .neo-toggle-checkbox {
            appearance: none;
            display: none;
        }
        .neo-toggle-label {
            width: 60px;
            height: 32px;
            background: #000000;
            border: 2px solid #000000;
            display: block;
            position: relative;
            cursor: pointer;
        }
        .neo-toggle-label:after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 24px;
            height: 24px;
            background: #ffffff;
            border: 2px solid #000000;
            transition: 0.1s;
        }
        .neo-toggle-checkbox:checked + .neo-toggle-label:after {
            left: calc(100% - 2px);
            transform: translateX(-100%);
            background: #FFF500;
        }
        /* Dashed Button */
        .btn-dashed {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='0' ry='0' stroke='%23000000FF' stroke-width='3' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>

                    VERSION 1.0.0-BETA_BUILD_99
