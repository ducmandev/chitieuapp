<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Neobrutalism Finance - Quick Add</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Space+Mono:ital,wght@0,400;0,700;1,400&amp;family=Archivo+Black&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFF500", // Warning Yellow
                        "secondary": "#FF00D6", // Electric Pink
                        "tertiary": "#00D1FF", // Cyan
                        "background-light": "#F2F0E9", // Off-White/Bone
                        "background-dark": "#222210",
                        "surface": "#FFFFFF",
                        "ink": "#000000",
                    },
                    fontFamily: {
                        "display": ["Archivo Black", "sans-serif"],
                        "body": ["Space Grotesk", "sans-serif"],
                        "mono": ["Space Mono", "monospace"],
                    },
                    borderRadius: {
                        "DEFAULT": "0px", 
                        "lg": "12px", 
                        "xl": "1.5rem", 
                        "full": "9999px"
                    },
                    boxShadow: {
                        "hard": "4px 4px 0px 0px #000000",
                        "hard-sm": "2px 2px 0px 0px #000000",
                        "hard-xl": "6px 6px 0px 0px #000000",
                    }
                },
            },
        }
    </script>
<style>
        /* Custom Utilities for Neobrutalism */
        .neo-border {
            border: 3px solid #000000;
        }
        .neo-border-thin {
            border: 2px solid #000000;
        }
        /* Button Press Effect */
        .neo-press:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px #000000;
        }
        /* Hide scrollbar for category list */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-body h-screen w-full overflow-hidden flex flex-col relative text-ink">
<!-- Top Bar -->
<div class="flex items-center justify-between p-4 pt-6 z-10 relative">
<button class="bg-white neo-border shadow-hard w-12 h-12 flex items-center justify-center rounded-lg hover:bg-red-100 neo-press transition-colors group">
<span class="material-symbols-outlined text-3xl group-hover:text-red-600 font-bold">close</span>
</button>
<div class="bg-primary neo-border shadow-hard px-4 py-2 rotate-1">
<h2 class="font-display text-xl tracking-wide uppercase">QUICK ADD</h2>
</div>
<div class="w-12 h-12"></div> <!-- Spacer for balance -->
</div>
<!-- Display Area (Terminal Style) -->
<div class="px-4 pb-2 pt-2 flex-shrink-0">
<div class="bg-black neo-border shadow-hard rounded-lg p-6 flex flex-col items-end justify-center h-48 relative overflow-hidden">
<!-- Glitchy decorative element -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary/20 animate-pulse"></div>
<span class="text-primary font-mono text-sm mb-2 opacity-80 tracking-widest uppercase text-right w-full border-b border-primary/30 pb-2">Amount to Burn</span>
<div class="flex items-baseline gap-1 mt-2">
<span class="text-primary/50 font-display text-4xl">$</span>
<span class="text-primary font-display text-6xl tracking-tighter">45.00</span>
</div>
<div class="absolute bottom-3 left-4 flex gap-2">
<div class="w-2 h-2 bg-secondary animate-bounce"></div>
<div class="w-2 h-2 bg-tertiary animate-bounce" style="animation-delay: 0.1s"></div>
<div class="w-2 h-2 bg-primary animate-bounce" style="animation-delay: 0.2s"></div>
</div>
</div>
</div>
<!-- Category Slider -->
<div class="py-4 pl-4 overflow-x-auto no-scrollbar flex-shrink-0">
<div class="flex gap-4 pr-4">
<!-- Active Category -->
<button class="flex-shrink-0 bg-primary neo-border shadow-hard rounded-full px-6 py-3 flex items-center gap-2 neo-press group">
<span class="material-symbols-outlined text-2xl group-active:scale-90 transition-transform">lunch_dining</span>
<span class="font-display text-lg">FOOD</span>
</button>
<!-- Inactive Categories -->
<button class="flex-shrink-0 bg-white neo-border-thin shadow-hard-sm rounded-full px-6 py-3 flex items-center gap-2 neo-press hover:bg-gray-50 opacity-70 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-2xl">train</span>
<span class="font-display text-lg">TRAVEL</span>
</button>
<button class="flex-shrink-0 bg-white neo-border-thin shadow-hard-sm rounded-full px-6 py-3 flex items-center gap-2 neo-press hover:bg-gray-50 opacity-70 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-2xl">stadia_controller</span>
<span class="font-display text-lg">TOYS</span>
</button>
<button class="flex-shrink-0 bg-white neo-border-thin shadow-hard-sm rounded-full px-6 py-3 flex items-center gap-2 neo-press hover:bg-gray-50 opacity-70 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-2xl">checkroom</span>
<span class="font-display text-lg">CLOTHES</span>
</button>
<button class="flex-shrink-0 bg-white neo-border-thin shadow-hard-sm rounded-full w-12 h-12 flex items-center justify-center neo-press hover:bg-gray-50 opacity-70 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Numpad & Actions Area -->
<div class="flex-1 bg-white neo-border-t-2 border-black p-4 pb-8 flex flex-col justify-end gap-4 rounded-t-3xl shadow-[0_-4px_0_0_rgba(0,0,0,1)] relative z-20 mt-[-10px]">
<!-- Keypad Grid -->
<div class="grid grid-cols-3 gap-3 h-full max-h-[400px]">
<!-- Row 1 -->
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">1</button>
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">2</button>
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">3</button>
<!-- Row 2 -->
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">4</button>
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">5</button>
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">6</button>
<!-- Row 3 -->
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">7</button>
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">8</button>
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">9</button>
<!-- Row 4 -->
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">.</button>
<button class="bg-background-light neo-border shadow-hard rounded-lg text-3xl font-display hover:bg-primary/20 active:bg-primary neo-press flex items-center justify-center transition-colors">0</button>
<button class="bg-red-100 neo-border shadow-hard rounded-lg text-2xl font-display hover:bg-red-300 active:bg-red-500 active:text-white neo-press flex items-center justify-center transition-colors group">
<span class="material-symbols-outlined text-3xl">backspace</span>
</button>
</div>
<!-- Commit Button -->
<button class="w-full bg-secondary text-white neo-border shadow-hard rounded-lg py-5 mt-2 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-3 group relative overflow-hidden">
<div class="absolute inset-0 bg-black opacity-0 group-hover:opacity-10 transition-opacity"></div> <!-- Hover texture -->
<span class="font-display text-2xl tracking-widest relative z-10 group-hover:text-primary">COMMIT</span>
<span class="material-symbols-outlined text-3xl relative z-10 group-hover:text-primary group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<!-- Decorative floating shapes in background -->
<div class="fixed top-20 right-[-20px] w-24 h-24 bg-tertiary neo-border rounded-full -z-10 opacity-50"></div>
<div class="fixed bottom-1/3 left-[-20px] w-16 h-16 bg-primary neo-border rotate-45 -z-10 opacity-50"></div>
</body></html>
